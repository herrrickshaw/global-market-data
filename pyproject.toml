[tool.black]
line-length = 100
target-version = ["py310"]
extend-exclude = "deoldify.py"   # Colab notebook export with `!` magics — not valid .py

[tool.ruff]
line-length = 100
target-version = "py310"
# deoldify.py = Colab export with `!` magics; *.ipynb need nbqa, not plain ruff
extend-exclude = ["deoldify.py", "*.ipynb"]

[tool.ruff.lint]
select = ["E", "F", "I", "W"]   # pyflakes (dead code/imports), pycodestyle, isort
# E402 (lazy/conditional imports) and E741 (short names like l) are intentional here;
# E501 line length is handled by black.
ignore = ["E402", "E741", "E501"]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["F841"]            # fixtures sometimes bind unused locals for clarity
# legacy data-fetchers keep optional/availability imports (used behind feature flags)
"nse_data_fetcher.py" = ["F401"]
"ml_signal_engine.py" = ["F401"]
"dl_strategy_eval.py" = ["F401"]
"sg_stock_daily_report.py" = ["F401"]
