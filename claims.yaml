# Claims ledger — every headline research conclusion, its evidence, and what
# would make it stale. Companion to the repos.yaml portfolio catalog.
#
# Rules:
#   - A conclusion is CITABLE only while status: validated and no
#     staleness_trigger has fired.
#   - When a trigger fires (data upgrade, coverage fix), status drops to
#     stale-rerun until the analysis is re-run on the new data.
#   - New headline claims get an entry BEFORE they're written up.
# Statuses: validated | provisional | stale-rerun | refuted | pending
# Seeded 2026-07-22 from repo reports + session records.

claims:
  piotroski-edge-is-illiquidity-not-size:
    statement: "The Piotroski F-score premium in India tracks stock ILLIQUIDITY, not firm size; LARGE+illiquid is the strongest cell (+33.7pp)"
    repo: piotroski-liquidity-research
    code: [backtest_piotroski_plus.py, cost_vs_edge.py]
    status: validated
    evidence: "double-sort size x illiquidity; turnover~mcap corr +0.797 had conflated them"
    staleness_triggers:
      - "re-run on XBRL filing-dated fundamentals (110,942 results to 2015) — current run uses screener.in export dating"
      - "re-run with split/bonus-ADJUSTED prices account-wide (IN adjusted 2026-07-21; heuristic CA filter was used before)"

  illiquidity-edge-capacity:
    statement: "The India illiquid-name edge survives at $100k (+11.3% net) but is dead by $10M; capacity ~$300-500k"
    repo: piotroski-liquidity-research
    code: [cost_vs_edge.py]
    status: validated
    evidence: "Corwin-Schultz spread + Amihud impact; %ADV 60.8% at $1M book"
    staleness_triggers:
      - "adjusted-price re-run (raw-Close split artifacts inflate illiquid returns)"

  us-piotroski-inverted:
    statement: "On point-in-time SEC EDGAR data, high F-score US stocks UNDERPERFORM (classic Piotroski inverted)"
    repo: piotroski-liquidity-research
    status: validated
    evidence: "PIT EDGAR fundamentals backtest"
    staleness_triggers:
      - "US price panel was letter-biased in early runs — confirm run used global-stock-screener 9,278-sym panel, not the interrupted alphabetical collection"

  piotroski-dominates-everywhere:
    statement: "Piotroski dominates all 7 markets"
    repo: global-market-research-platform
    status: refuted
    evidence: "variance claim on a 272-stock sample; real backtest shows mean-reversion wins US/KR/CN/JP, India momentum-friendly, Golden Cross weakest everywhere. Reconciliation note in-repo."

  liquidity-predicts-scan-pass:
    statement: "Liquidity predicts firm quality (+) and stock returns (-); 50>200DMA pass-rate association robust (India p=3.7e-12, Japan replicates); Darvas flips sign by market"
    repo: global-market-research-platform
    status: provisional
    evidence: "single-day cross-sections ONLY — no forward returns"
    staleness_triggers:
      - "forward-return validation via signal ledger scoring (score_signals.py, cron live 2026-07-22) — upgrade to validated or refuted as outcomes accrue"

  india-fake-illiquidity-premium-raw-close:
    statement: "Raw (unadjusted) Close manufactures a fake +12.2% illiquid premium with 248% sd; CA filter collapses sd to 29%"
    repo: global-market-data
    status: validated
    evidence: "GOLDBEES/SETFGOLD 1:100 unit splits, KAUSHALYA reverse split; backtest_liquidity_forward.py filter"
    note: "Root cause now properly fixed for IN via warehouse/ohlcv_adj + adjustment_factors (23,480 CAs). CORRECTION 2026-07-23: JP/KR/CN/US panels are NOT raw — they are yfinance-adjusted as of collection (verified: NTT 25:1, Samsung 50:1, NVDA 10:1, TSLA 3:1 all pre-adjusted in-panel). The residual defect is POST-ASSEMBLY breaks only — splits after each panel's last full re-download appear as raw jumps. Fixed via price_adjuster_global.py: 86 candidates detected (integer-ratio + calm-day + turnover gates), 8 confirmed against the yfinance split calendar, sparse overlays written to warehouse/ohlcv_adj/{JP,KR,US}/corrected_symbols.parquet (overlay-first read rule; CN/EU had zero confirmed residuals). 78 unconfirmed candidates retained in adjustment_factors_heuristic.parquet as audit trail."

  india-ca-intimation-drift:
    statement: "After a bonus/split board-meeting intimation becomes public, buying at intimation+2td and holding to ex-1 captured +10.4% (bonus, n=295, 75% hit) / +16.5% (split, n=258, 83% hit) abnormal-vs-market-median over 35-50 trading days; post-ex there is NO drift (47% hit)"
    repo: market-pipeline (home)
    code: [pit_event_studies.py, collect_board_meetings.py]
    status: provisional
    evidence: "reports/PIT_EVENT_STUDIES.md 2026-07-23; anchor = bm_timestamp (NSE caBroadcastDate is null everywhere); adjusted prices, PIT broadcast timing"
    staleness_triggers:
      - "universe-level bias: filing-universe baseline hit is ~70-75%, not 50% — needs matched-window benchmark before validated"
      - "no FDR pass; single 10y sample, no subperiod split"
      - "no cost model applied (small-cap names — Corwin-Schultz spread check required)"

  non-india-panels-already-adjusted:
    statement: "JP/KR/CN/US warehouse panels are yfinance split-adjusted at collection; only post-assembly residual breaks (8 confirmed across 3 markets) needed fixing — the account-wide 'raw Close' risk flag was overbroad, applying fully only to India bhavcopy data"
    repo: global-market-data
    code: [price_adjuster_global.py]
    status: validated
    evidence: "NTT 9432.T trades ¥147-155 pre-25:1 (real ~¥4,100); Samsung 005930.KS ₩41-43k pre-50:1 (real ~₩2.65M); NVDA $120-131 through 10:1; fractional closes + back-scaled volume throughout = auto_adjust output. Residuals: 7946.T ¥3,673→¥733 5:1, 8227.T 3:1, 3 KR, 3 US — all calendar-confirmed and overlay-corrected 2026-07-23"
    staleness_triggers:
      - "each panel re-assembly resets the residual set — re-run price_adjuster_global.py after any full re-download or major incremental append"
    note: "yfinance BUG found during validation: .history(auto_adjust=True) serves UNADJUSTED prices for recent JP/KR splits even when .splits knows the event (8227.T window shows raw ¥10,663→¥3,433). Validate corrections by series continuity + split calendar, never by yf windowed returns for JP/KR."

  roace-via-statements-not-ratios:
    statement: "ROACE is computable for India via yfinance income_stmt+balance_sheet (RELIANCE 9.0%, TCS 54.9% verified); reconstructing capital employed from ratios FAILS"
    repo: piotroski-liquidity-research
    code: [roace_by_liquidity.py]
    status: validated

  survivorship-gmd-india:
    statement: "gmd India 10.5y panel passes survivorship checks: 964/3,476 symbols retained after delisting"
    repo: global-market-data
    status: validated
    staleness_triggers:
      - "OTHER markets' panels have NO survivorship audit — do not extend this credential to US/JP/KR/CN/EU"

  signal-ledger-calibration:
    statement: "Scan signals have measured forward-return calibration; 20,347 scored signal-horizons after rescued-snapshot backfill"
    repo: market-pipeline (home)
    code: [score_signals.py, backfill_signals.py]
    status: provisional
    evidence: "2026-07-22, June-12..26 cohort (TRUE point-in-time snapshots): US darvas BUY +21d n=1,751 hit 66% median +2.70% excess +2.10%; IN BUY +21d n=334 hit 65% +3.11% excess +0.92%; SELL signals FAIL everywhere (hit 34-43% — breakdowns tend to bounce); +5d horizons ~ coin flip"
    staleness_triggers:
      - "single two-week regime window (Jun 2026) — needs more cohorts before validated; weekly cron accrues"
      - "US legs on raw Close — re-check when US adjusted panel lands"
    note: "SELL-signal failure is itself actionable: darvas BREAKDOWN_SELL as a short signal is contrarian in this cohort"

  factor-combo-grid-no-fdr-survivors:
    statement: "NO strategy-market combo in the factor_combo grid (12 hypotheses, IN+US) survives family-wide BH-FDR at q=0.10 — including nominally-significant cells (not_distress US p=.039, low_asset_growth US p=.040)"
    repo: market-pipeline (home)
    code: [multiple_testing.py]
    status: validated
    evidence: "reports/MULTIPLE_TESTING.md 2026-07-22; dof = n_years-1 (annual observations, conservative)"
    note: "Citing any single-cell 'edge' from this grid without an FDR pass is now a claims-policy violation. Cells may still be real — the grid as searched cannot distinguish them from selection noise."

