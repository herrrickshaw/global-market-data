name: tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { lfs: false }
      - uses: actions/setup-python@v5
        with: { python-version: "3.11", cache: pip }
      - run: pip install ruff==0.15.20 black==25.11.0   # pin to match local & pre-commit
      - name: Ruff (lint / dead code)
        run: ruff check .
      - name: Black (format check)
        run: black --check .

  pytest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false          # tests use synthetic data — no LFS seeds needed

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          # only what the tested modules import — keep CI fast (no yfinance/nse/etc.)
          pip install pandas numpy pyarrow lmdb pytest

      - name: Run tests
        run: pytest -q
